<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>LJ Festas & Momentos</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- ICONS -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

</head>

<body>

<!-- FUNDO -->
<div class="bg-overlay"></div>

<!-- HERO -->
<section class="hero">

<div class="container">

  <!-- CARD -->
  <div class="perfil">

    <!-- LOGO -->
    <div class="logo">

      <img src="img/logo.png" alt="Logo">

    </div>

    <!-- INFO -->
    <div class="info">

      <h1>
        LJ Festas & Momentos ✨
      </h1>

      <p class="destaque">
        Pegue & Monte
      </p>

      <p class="descricao">
        Decorações para momentos especiais 💎
      </p>

      <p class="cidade">
        📍 Marília/SP
      </p>

      <!-- BOTÕES -->
      <div class="botoes">

        <a
        href="https://wa.me/5514998018784"
        target="_blank"
        class="btn whats">

        <i class="fa-brands fa-whatsapp"></i>
        WhatsApp

        </a>

        <a
        href="https://www.instagram.com/ljfestasemomentos/"
        target="_blank"
        class="btn insta">

        <i class="fa-brands fa-instagram"></i>
        Instagram

        </a>

      </div>

    </div>

  </div>

  <!-- TITULO -->
  <div class="titulo-area">

    <h2>
      Nossas Decorações
    </h2>

    <div class="linha"></div>

  </div>

  <!-- GALERIA -->
  <div class="galeria">

    <!-- FOTO 1 -->
    <div class="foto">

      <img
      src="img/decoracao1.png"
      alt="Decoração 1">

    </div>

    <!-- FOTO 2 -->
    <div class="foto">

      <img
      src="img/decoracao2.png"
      alt="Decoração 2">

    </div>

    <!-- FOTO 3 -->
    <div class="foto">

      <img
      src="img/decoracao3.png"
      alt="Decoração 3">

    </div>

    <!-- FOTO 4 -->
    <div class="foto">

      <img
      src="img/decoracao4.jpeg"
      alt="Decoração 4">

    </div>

  </div>

</div>

</section>

<!-- FOOTER -->
<footer>

  © 2025 LJ Festas & Momentos

</footer>

</body>

</html>
